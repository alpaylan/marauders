name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --locked

  build:
    needs:
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin_ext: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            bin_ext: ""
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
            bin_ext: ""
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip
            bin_ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }} --bin marauders --bin marauders-import-rust-mutants

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          package_dir="marauders-${{ matrix.target }}"
          mkdir "$package_dir"
          cp "target/${{ matrix.target }}/release/marauders${{ matrix.bin_ext }}" \
             "$package_dir/marauders${{ matrix.bin_ext }}"
          cp "target/${{ matrix.target }}/release/marauders-import-rust-mutants${{ matrix.bin_ext }}" \
             "$package_dir/marauders-import-rust-mutants${{ matrix.bin_ext }}"
          tar -czf "${package_dir}.tar.gz" "$package_dir"
          rm -rf "$package_dir"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $packageDir = "marauders-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/marauders${{ matrix.bin_ext }}" "$packageDir/marauders${{ matrix.bin_ext }}"
          Copy-Item "target/${{ matrix.target }}/release/marauders-import-rust-mutants${{ matrix.bin_ext }}" "$packageDir/marauders-import-rust-mutants${{ matrix.bin_ext }}"
          Compress-Archive -Path "$packageDir/*" -DestinationPath "$packageDir.zip" -Force
          Remove-Item -Recurse -Force $packageDir

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: marauders-${{ matrix.target }}
          path: marauders-${{ matrix.target }}.${{ matrix.archive }}

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: marauders-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum marauders-* > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
